name: Rust

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - name: Create frontend stub
        run: mkdir -p src-tauri/frontend && echo '<!DOCTYPE html><html><body></body></html>' > src-tauri/frontend/index.html
      - name: Check Tauri app
        run: cargo check --manifest-path src-tauri/Cargo.toml --verbose
