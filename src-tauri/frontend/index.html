<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
	<meta name="theme-color" content="#0a0a0b">
	<title>Signet</title>
	<style>
		:root {
			--bg: #0a0a0b;
			--text: #e4e4e7;
			--accent: #f59e0b;
			--muted: #71717a;
		}
		* { margin: 0; padding: 0; box-sizing: border-box; }
		body {
			font-family: 'Geist Mono', -apple-system, BlinkMacSystemFont, sans-serif;
			background: var(--bg);
			color: var(--text);
			min-height: 100vh;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
		}
		.container {
			text-align: center;
			padding: 2rem;
		}
		h1 {
			font-size: 1.5rem;
			font-weight: 600;
			margin-bottom: 0.5rem;
		}
		.status {
			color: var(--accent);
			font-size: 0.875rem;
		}
		.spinner {
			width: 24px;
			height: 24px;
			border: 2px solid var(--muted);
			border-top-color: var(--accent);
			border-radius: 50%;
			animation: spin 0.8s linear infinite;
			margin: 1rem auto;
		}
		@keyframes spin { to { transform: rotate(360deg); } }
		.error { color: #ef4444; }
		#memories { margin-top: 1.5rem; text-align: left; max-width: 400px; width: 100%; }
		.memory-card {
			background: #18181b;
			border-radius: 8px;
			padding: 0.75rem;
			margin-bottom: 0.5rem;
			font-size: 0.8rem;
			line-height: 1.4;
		}
		.memory-card .meta {
			color: var(--muted);
			font-size: 0.7rem;
			margin-top: 0.25rem;
		}
		.search-bar {
			display: flex;
			gap: 0.5rem;
			margin-top: 1.5rem;
			max-width: 400px;
			width: 100%;
		}
		.search-bar input {
			flex: 1;
			padding: 0.5rem 0.75rem;
			border-radius: 6px;
			border: 1px solid #27272a;
			background: #18181b;
			color: var(--text);
			font-family: inherit;
			font-size: 0.8rem;
		}
		.search-bar input:focus { outline: none; border-color: var(--accent); }
		.search-bar button {
			padding: 0.5rem 1rem;
			border-radius: 6px;
			border: none;
			background: var(--accent);
			color: #0a0a0b;
			font-weight: 600;
			font-family: inherit;
			cursor: pointer;
		}
		.capture-bar {
			display: flex;
			gap: 0.5rem;
			margin-top: 0.75rem;
			max-width: 400px;
			width: 100%;
		}
		.capture-bar textarea {
			flex: 1;
			padding: 0.5rem 0.75rem;
			border-radius: 6px;
			border: 1px solid #27272a;
			background: #18181b;
			color: var(--text);
			font-family: inherit;
			font-size: 0.8rem;
			resize: none;
			height: 60px;
		}
		.capture-bar textarea:focus { outline: none; border-color: var(--accent); }
		.capture-bar button {
			padding: 0.5rem 1rem;
			border-radius: 6px;
			border: none;
			background: var(--accent);
			color: #0a0a0b;
			font-weight: 600;
			font-family: inherit;
			cursor: pointer;
			align-self: flex-end;
		}
	</style>
</head>
<body>
	<div class="container">
		<h1>Signet</h1>
		<div id="status" class="status">Connecting...</div>
		<div class="spinner" id="spinner"></div>

		<div class="search-bar">
			<input type="text" id="search-input" placeholder="Search memories..." />
			<button onclick="searchMemories()">Search</button>
		</div>

		<div class="capture-bar">
			<textarea id="capture-input" placeholder="Quick capture..."></textarea>
			<button onclick="quickCapture()">Save</button>
		</div>

		<div id="memories"></div>
	</div>

	<script>
		const API_BASE = 'http://localhost:3850';

		async function checkStatus() {
			try {
				const res = await fetch(`${API_BASE}/health`);
				if (res.ok) {
					const data = await res.json();
					document.getElementById('status').textContent = `Running — v${data.version || '?'}`;
					document.getElementById('spinner').style.display = 'none';
					loadRecentMemories();
				} else {
					throw new Error('not ok');
				}
			} catch {
				document.getElementById('status').textContent = 'Daemon not running';
				document.getElementById('status').classList.add('error');
				document.getElementById('spinner').style.display = 'none';
				setTimeout(checkStatus, 3000);
			}
		}

		async function loadRecentMemories() {
			try {
				const res = await fetch(`${API_BASE}/api/memories?limit=10`);
				if (!res.ok) return;
				const data = await res.json();
				const container = document.getElementById('memories');
				container.innerHTML = '';
				for (const m of data.memories || []) {
					const card = document.createElement('div');
					card.className = 'memory-card';
					card.innerHTML = `
						${escapeHtml(m.content?.slice(0, 200) || '')}
						<div class="meta">${m.who || ''} · ${timeAgo(m.created_at)}</div>
					`;
					container.appendChild(card);
				}
			} catch {}
		}

		async function searchMemories() {
			const query = document.getElementById('search-input').value.trim();
			if (!query) return;
			try {
				const { invoke } = window.__TAURI_INTERNALS__
					? await import('@tauri-apps/api/core')
					: { invoke: async (_, args) => {
						const res = await fetch(`${API_BASE}/api/memory/recall`, {
							method: 'POST',
							headers: { 'Content-Type': 'application/json' },
							body: JSON.stringify(args),
						});
						return await res.text();
					}};

				const result = await invoke('search_memories', { query, limit: 10 });
				const data = JSON.parse(result);
				const container = document.getElementById('memories');
				container.innerHTML = '';
				for (const m of data.memories || data.results || []) {
					const card = document.createElement('div');
					card.className = 'memory-card';
					const content = m.content || m.text || '';
					card.innerHTML = `
						${escapeHtml(content.slice(0, 200))}
						<div class="meta">${m.who || ''} · ${timeAgo(m.created_at || m.timestamp)}</div>
					`;
					container.appendChild(card);
				}
			} catch (e) {
				console.error('Search failed:', e);
			}
		}

		async function quickCapture() {
			const content = document.getElementById('capture-input').value.trim();
			if (!content) return;
			try {
				const { invoke } = window.__TAURI_INTERNALS__
					? await import('@tauri-apps/api/core')
					: { invoke: async (_, args) => {
						await fetch(`${API_BASE}/api/memory/remember`, {
							method: 'POST',
							headers: { 'Content-Type': 'application/json' },
							body: JSON.stringify(args),
						});
					}};

				await invoke('quick_capture', { content });
				document.getElementById('capture-input').value = '';
				loadRecentMemories();
			} catch (e) {
				console.error('Capture failed:', e);
			}
		}

		function escapeHtml(str) {
			const div = document.createElement('div');
			div.textContent = str;
			return div.innerHTML;
		}

		function timeAgo(iso) {
			if (!iso) return '';
			try {
				const diff = Date.now() - new Date(iso).getTime();
				const mins = Math.floor(diff / 60000);
				if (mins < 1) return 'just now';
				if (mins < 60) return `${mins}m ago`;
				const hours = Math.floor(mins / 60);
				if (hours < 24) return `${hours}h ago`;
				return `${Math.floor(hours / 24)}d ago`;
			} catch { return ''; }
		}

		checkStatus();
	</script>
</body>
</html>
